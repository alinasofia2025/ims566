<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | TeacherTask</title>
    <!-- Boostrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font API -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="card-login-card shadow-lg">
            <div class="card-body">
                <div class="text-center mb-3">
                    <div class="logo-container">
                        <img src="img/teachertaskLogo.gif" alt="TeacherTask Logo">
                    </div>
                </div>
                <h3 class="login-title">TeacherTask.com</h3>
                <p class="text-muted text-center login-subtitle">Sign in to access your dashboard</p>
                
                <div id="loginContainer">
                    <div id="loginForm">
                        <!-- Login Form -->
                         <form id="loginForm" novalidate>
                            <div class="form-group mb-3">
                                <div class="login-group-icon">
                                    <span class="login-icon"><span class="material-symbols-rounded">mail</span></span>
                                    <input type="email" class="form-control" id="loginEmail" placeholder="Email address">
                                </div>
                                <div id="loginEmailError" class="error-feedback d-none"></div>
                            </div>
                            <div class="form-group mb-3">
                                <div class="login-group-icon">
                                    <span class="login-icon"><span class="material-symbols-rounded">lock</span></span>
                                    <input type="password" class="form-control" id="loginPassword" placeholder="Password">
                                </div>
                                <div id="loginPasswordError" class="error-feedback d-none"></div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberCheck">
                                    <label class="form-check-label" for="rememberCheck">Remember me</label>
                                </div>
                                <a href="#" class="text-decoration-none forgot-link" id="forgotMock">Forgot password?</a>
                            </div>
                            <button type="submit" class="btn btn-primary btn-login w-100">
                                <span class="material-symbols-rounded">login</span> Sign In
                            </button>
                        </form>
                        <!-- footer -->
                         <div class="login-footer">
                            © 2026 TeacherTask Dashboard | Designed & Developed by Alina Sofia
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- error credential popup -->
        <div id="errorMessage" class="error-toast" style="display: none;">
            <div class="error-custom">
                <div class="d-flex align-items-center gap-2">
                    <span class="material-symbols-rounded text-info" id="errorIcon">warning</span>
                    <strong id="errorTitle" class="me-auto">Error</strong>
                    <button type="button" class="btn-close btn-close-sm" id="closeErrorBtn"></button>
                </div>
                <div class="mt-2 small" id="errorMsgContent">Invalid Credentials</div>
            </div>
        </div>
    </div>


     <script>
        // hardcoded credentials
        const validCredentials = {
            email: "guru@smksubangjaya.edu.my",
            password: "password123"
        };

        function showError(message, type = "error") {
            const errorDiv = document.getElementById("errorMessage");
            const errorTitle = document.getElementById("errorTitle");
            const errorMsg = document.getElementById("errorMsgContent");
            const errorIcon = document.getElementById("errorIcon");

            errorIcon.classList.remove("text-warning", "text-success");

            if (type === "error") {
                errorTitle.innerText = "Login Failed";
                errorIcon.innerText = "warning";
                errorIcon.classList.add("text-warning");
                errorMsg.innerText = message;
            } else if (type === "success") {
                errorTitle.innerText = "Success";
                errorIcon.innerText = "check_circle";
                errorIcon.classList.add("text-success");
                errorMsg.innerText = message;
            } else {
                errorTitle.innerText = "Info";
                errorIcon.innerText = "info";
                errorMsg.innerText = message;
            }

            errorDiv.style.display = "flex";
            setTimeout(() => {
                errorDiv.style.display = "none";
            }, 3500);
        }

        function displayError(fieldId, message) {
            const errorDiv = document.getElementById(fieldId);
            if (errorDiv) {
                errorDiv.innerText = message;
                errorDiv.classList.remove("d-none");
            }
        }

        function clearLoginErrors() {
            const emailError = document.getElementById("loginEmailError");
            const passError = document.getElementById("loginPasswordError");
            if (emailError) emailError.classList.add("d-none");
            if (passError) passError.classList.add("d-none");
        }

        // email & pass submit
        const loginForm = document.getElementById("loginForm");
        loginForm.addEventListener("submit", function(e) {
            e.preventDefault();
            clearLoginErrors();
            
            let email = document.getElementById("loginEmail").value.trim();
            let password = document.getElementById("loginPassword").value;
            let hasError = false;
            
            if (!email) {
                displayError("loginEmailError", "Email address is required.");
                hasError = true;
            } else if (!email.includes("@") || !email.includes(".")) {
                displayError("loginEmailError", "Enter a valid email address.");
                hasError = true;
            }
            
            if (!password) {
                displayError("loginPasswordError", "Password cannot be empty.");
                hasError = true;
            }
            
            if (hasError) return;
            
            if (email === validCredentials.email && password === validCredentials.password) {
                showError("Login successful! Redirecting to dashboard...", "success");
                
                if (document.getElementById("rememberCheck").checked) {
                    localStorage.setItem("remembered_email", email);
                } else {
                    localStorage.removeItem("remembered_email");
                }
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1200);
            } else {
                showError("Invalid email or password. Please try again.", "error");
                displayError("loginPasswordError", "Wrong email or password.");
            }
        });

        // remember me 
        const rememberedEmail = localStorage.getItem("remembered_email");
        if (rememberedEmail) {
            document.getElementById("loginEmail").value = rememberedEmail;
            document.getElementById("rememberCheck").checked = true;
        }

        // forogt password
        document.getElementById("forgotMock").addEventListener("click", (e) => {
            e.preventDefault();
            showError("Demo: Use guru@smksubangjaya.edu.my / password123", "info");
        });

        // close error notification
        document.getElementById("closeErrorBtn").addEventListener("click", () => {
            document.getElementById("errorMessage").style.display = "none";
        });
    </script>
</body>
</html>
